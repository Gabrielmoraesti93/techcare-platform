<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Moraes Tech - Painel</title>

  <!-- CSS -->
  <link rel="stylesheet" href="./assets/css/style.css" />
</head>

<body>
  <div class="container">
    <aside class="sidebar">
      <div class="brand">
        <h2>Moraes Tech</h2>
        <small class="muted">Painel Admin</small>
      </div>

      <!-- MENU (SPA: não troca de página) -->
      <nav class="menu">
        <a href="#" onclick="navDashboard(event)">Dashboard</a>
        <a href="#" onclick="navClientes(event)">Clientes</a>
        <a href="#" onclick="navCadastrarCliente(event)">Cadastrar Cliente</a>

        <div class="topbar-right">
          <div class="pill">Ambiente: <b>DEV</b></div>

      <section class="content" id="conteudo"></section>

  <!-- JS: carregue APENAS 1 arquivo (o seu app.js final) -->
